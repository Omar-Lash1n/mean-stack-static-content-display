<header class="header" [class.scrolled]="isScrolled" id="site-header">
  <div class="header__container container">
    <a href="#" class="header__logo" id="logo-link">
      <span class="header__logo-icon">◈</span>
      <span class="header__logo-text">StarterHub</span>
    </a>

    <nav class="header__nav" id="main-nav">
      <a href="#hero" class="header__nav-link">Home</a>
      <a href="#about" class="header__nav-link">About</a>
      <a href="#services" class="header__nav-link">Services</a>
      <a href="#gallery" class="header__nav-link">Gallery</a>
      <a href="#footer" class="header__nav-link">Contact</a>
    </nav>

    <button class="header__menu-btn" (click)="toggleMenu()" id="mobile-menu-btn" aria-label="Toggle menu">
      <span class="header__menu-icon" [class.open]="menuOpen">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>
  </div>

  <!-- Mobile Nav -->
  <nav class="header__mobile-nav" [class.open]="menuOpen" id="mobile-nav">
    <a href="#hero" class="header__mobile-link" (click)="closeMenu()">Home</a>
    <a href="#about" class="header__mobile-link" (click)="closeMenu()">About</a>
    <a href="#services" class="header__mobile-link" (click)="closeMenu()">Services</a>
    <a href="#gallery" class="header__mobile-link" (click)="closeMenu()">Gallery</a>
    <a href="#footer" class="header__mobile-link" (click)="closeMenu()">Contact</a>
  </nav>
</header>
